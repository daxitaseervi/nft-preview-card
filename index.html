<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <title>Frontend Mentor | NFT preview card component</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    
    <div class="card__img-container">
      <img class="card__img-icon" src="images/icon-view.svg" alt="Eye icon">
      <img src="images/image-equilibrium.jpg" alt="A coloful light reflecting cube" class="card__img">
    </div>


    <div class="card__info">
      <h1 class="card__title">Equilibrium #3429</h1>
      <p class="card__description">
        Our Equilibrium collection promotes balance and calm.
      </p>

      <div class="card__stats-container">
        <div class="card__stats">
          <img src="images/icon-ethereum.svg" alt="Etherem icon" class="card__stats-icon">
          <p class="card__stats-text">0.041 ETH</p>
        </div>

        <div class="card__stats">
          <img src="images/icon-clock.svg" alt="Clock icon" class="card__stats-icon">
          <p class="card__stats-text">3 days left</p>
        </div>
      </div>

      <hr>

      <div class="card__author">
        <img src="images/image-avatar.png" alt="Avatar image" class="card__author-img">
        <p class="card__author-text">Creation of <span class="card__author-name">Jules Wyvern</span></p>
      </div>
    </div>
  </main>
</body>
</html>
